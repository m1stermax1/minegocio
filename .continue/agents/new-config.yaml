name: Local Config
version: 1.0.0
schema: v1
models:
  - name: Llama 3.1 8B
    provider: ollama
    model: llama3.1:8b
    roles:
      - chat
      - edit
      - apply
  - name: Qwen2.5-Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b-base
    roles:
      - autocomplete
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text:latest
    roles:
      - embed
  - name: Qwen 2.5 Coder 7b
    provider: ollama
    model: qwen-coder2.5-7b
  - name: qwen2.5-coder
    provider: ollama
    model: qwen2.5-coder
    capabilities:
      - tool_use
  - name: Autodetect
    provider: ollama
    model: AUTODETECT
